[build]
# Keep ordinary workspace commands on the host target. `xtask build-kernel`
# validates the kernel crate while the custom target path matures.

[alias]
xtask = "run -p xtask --"

[target.'cfg(target_os = "aesynx")']
linker = "rust-lld"
rustflags = [
    "-C",
    "code-model=kernel",
    "-C",
    "relocation-model=static",
    "-C",
    "link-arg=-Tlinker/kernel-x86_64.ld",
    "-C",
    "panic=abort",
    "--remap-path-prefix",
    "/home/eldryoth/Work/codex-projects/aesynx=.",
]

[target.x86_64-unknown-none]
linker = "rust-lld"
rustflags = [
    "-C",
    "code-model=kernel",
    "-C",
    "relocation-model=static",
    "-C",
    "link-arg=-Tlinker/kernel-x86_64.ld",
    "-C",
    "panic=abort",
    "--remap-path-prefix",
    "/home/eldryoth/Work/codex-projects/aesynx=.",
]
