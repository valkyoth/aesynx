[build]
# Keep ordinary workspace commands on the host target. `xtask build-kernel`
# validates the kernel crate while the custom target path matures.
rustc-workspace-wrapper = "scripts/rustc-workspace-wrapper.sh"

[alias]
xtask = "run -p xtask --"

[target.'cfg(target_os = "aesynx")']
linker = "rust-lld"
rustflags = [
    "-C",
    "code-model=kernel",
    "-C",
    "relocation-model=static",
    "-C",
    "link-arg=-Tlinker/kernel-x86_64.ld",
    "-C",
    "panic=abort",
    "-C",
    "target-feature=-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2,-avx,-avx2",
]

[target.x86_64-unknown-none]
linker = "rust-lld"
rustflags = [
    "-C",
    "code-model=kernel",
    "-C",
    "relocation-model=static",
    "-C",
    "link-arg=-Tlinker/kernel-x86_64.ld",
    "-C",
    "panic=abort",
    "-C",
    "target-feature=-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2,-avx,-avx2",
]
